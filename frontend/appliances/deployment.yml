apiVersion: apps/v1
kind: Deployment
metadata:
  name: appliances-deployment
  labels:
    app: appliances
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appliances
  template:
    metadata:
      labels:
        app: appliances
    spec:
      containers:
      - name: appliances
        image: 968603941340.dkr.ecr.us-east-1.amazonaws.com/shopping-site-appliances:fa6757f2a76b49fdde983a0cf113df520e1c1944
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: appliances-service
  labels:
    app: appliances
spec:
  type: ClusterIP
  selector:
    app: appliances
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
