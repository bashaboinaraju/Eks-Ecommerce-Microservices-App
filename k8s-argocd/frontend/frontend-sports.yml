apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-sports
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bashaboinaraju/Eks-Ecommerce-Microservices-App.git
    path: frontend/sports
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
